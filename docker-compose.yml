services:
  db:
    image: postgres:15
    container_name: smartcanteen_db
    restart: always
    environment:
      POSTGRES_DB: smartcanteen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: A123a123s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartcanteen_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:A123a123s@db:5432/smartcanteen
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcanteen_frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data: